<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Preguntados Milton Ochoa — El juego de trivia competitivo de Milton Ochoa. ¡Pon a prueba tu conocimiento!">
  <meta name="theme-color" content="#0D1B2A">

  <!-- Open Graph -->
  <meta property="og:title" content="Preguntados Milton Ochoa">
  <meta property="og:description" content="El juego de trivia competitivo. Juega en línea, sube de nivel y gana premios.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Preguntados MO">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Preguntados Milton Ochoa</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0D1B2A;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #D4AF37;
      font-family: sans-serif;
      font-size: 14px;
    }
    #loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #1E3A5F;
      border-top-color: #D4AF37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-spinner"></div>
    <span>Cargando Preguntados...</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
